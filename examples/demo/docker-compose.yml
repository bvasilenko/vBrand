# AC#40 demo - localhost docker compose target.
# Brings up the brand-showcase site on http://localhost:8080.
# This file mirrors what `vbrand deploy --target=compose-ssh` renders.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vbrand-demo
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/"]
      interval: 10s
      timeout: 2s
      retries: 5
