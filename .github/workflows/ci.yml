# .github/workflows/ci.yml - copy to each per-package repo's .github/workflows/
# Pinned tool versions per frameworks/manager/execution/conventions.md §5.

name: ci

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Self-hosted to bypass GitHub-hosted billing-lock; per-repo runner registered ad-hoc.
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
          # actions/cache@v4 post-cleanup hangs on self-hosted; disable.
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test

      - name: scrub
        run: bash .github/scripts/scrub.sh .

      - name: build
        run: bun run build

      - name: determinism-check
        run: |
          mv dist dist-1
          bun run build
          diff -r dist dist-1 || (echo "non-deterministic build" && exit 1)
          rm -rf dist-1

      - name: tarball-size-budget
        # Size drivers: Satori Inter font asset and @resvg/resvg-js native binary.
        run: |
          UNPACKED=$(npm pack --dry-run --json 2>/dev/null | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0].unpackedSize.toString())")
          [ "$UNPACKED" -le 3145728 ] || (echo "tarball exceeds 3 MB budget: ${UNPACKED} bytes" && exit 1)
          echo "tarball size OK: ${UNPACKED} bytes"

      - name: emit-og-x64
        # Produce a reference OG on x64 so cross-arch-og can compare pixel equivalence.
        run: bun run .github/scripts/emit-og-ci.mjs /tmp/og-x64.png

      - name: upload-og-x64
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: og-x64
          path: /tmp/og-x64.png
          retention-days: 1

  cross-arch-og:
    needs: verify
    if: false
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: test-emit-deterministic
        run: bun run test -- --reporter=verbose tests/emit-deterministic.test.ts

      - name: emit-og-arm64
        run: bun run .github/scripts/emit-og-ci.mjs /tmp/og-arm64.png

      - name: download-og-x64
        uses: actions/download-artifact@v4
        with:
          name: og-x64
          path: /tmp/og-ref

      - name: pixel-compare-cross-arch
        # 1% tolerance at threshold 0.1 accommodates resvg native binary variation across architectures.
        run: bun run .github/scripts/compare-og.mjs /tmp/og-ref/og-x64.png /tmp/og-arm64.png

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: probe-consumer
        run: bash .github/scripts/probe-consumer.sh

      - name: setup-npm-auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --provenance unsupported on self-hosted runners (sigstore requires GitHub-hosted).
      - name: publish
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: deprecate-superseded-range
        # Deprecate every version strictly below current so patch bumps (e.g. 0.2.0→0.2.1)
        # are covered as well as minor bumps (e.g. 0.1.x→0.2.0).
        # Non-fatal (|| true): a registry outage must not roll back a successful publish.
        run: |
          CURRENT=$(node -e "process.stdout.write(require('./package.json').version)")
          REASON="Superseded by @booga/vbrand@${CURRENT}. See CHANGELOG.md for the migration guide."
          npm deprecate "@booga/vbrand@<${CURRENT}" "$REASON" || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: deprecate-020-migration-note
        # 0.2.0 shipped without voiceCanonical/voiceDescription extractors and the CSS-var
        # color cascade; overwrite its deprecation reason with the targeted migration message.
        # Runs after the generic range step so it wins on npm registry.
        run: npm deprecate "@booga/vbrand@0.2.0" "0.2.0 missed extractable voice fields and CSS-color fallback; superseded by 0.2.1" || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
